<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES 원료상세검색</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
    <header class="top-header">
        <a href="/" class="header-brand">
            <img src="/static/img/logo.png" alt="Logo" class="brand-logo">
            <span>생산관리팀 통합 관리</span>
        </a>
        <nav class="header-nav">
            <a href="/" class="nav-btn">
                <i class="fa-solid fa-house"></i>
                재고현황
            </a>
            <a href="/material-info" class="nav-btn">
                <i class="fa-solid fa-list-ul"></i>
                안전재고
            </a>
            <a href="/purchase-dashboard" class="nav-btn">
                <i class="fa-solid fa-chart-line"></i>
                구매 대시보드
            </a>
            <a href="/facilities" class="nav-btn">
                <i class="fa-solid fa-tools"></i>
                설비 관리
            </a>
            <a href="/inventory" class="nav-btn active">
                <i class="fa-solid fa-magnifying-glass"></i>
                원료상세검색
            </a>
            <a href="/raw-material" class="nav-btn">
                <i class="fa-solid fa-flask"></i>
                원재료관리
            </a>
            <a href="/producible" class="nav-btn">
                <i class="fa-solid fa-flask-vial"></i>
                생산가능수량
            </a>
            <a href="/production" class="nav-btn">
                <i class="fa-solid fa-industry"></i>
                생산 관리
            </a>
            <a href="/finished-product" class="nav-btn">
                <i class="fa-solid fa-box"></i>
                완제품관리
            </a>
            <a href="/validation" class="nav-btn">
                <i class="fa-solid fa-clipboard-check"></i>
                밸리데이션
            </a>
            <a href="/calibration" class="nav-btn">
                <i class="fa-solid fa-compass-drafting"></i>
                검교정
            </a>
            <a href="/upload-usage" class="nav-btn">
                <i class="fa-solid fa-file-arrow-up"></i>
                사용량 업로드
            </a>
            <a href="/upload-receiving" class="nav-btn">
                <i class="fa-solid fa-file-import"></i>
                입고 업로드
            </a>
        </nav>
    </header>

        <!-- Main Content -->
        <main>
            <!-- Control Panel -->
            <section class="control-panel glass-panel">
                <h2><i class="fa-solid fa-filter"></i> 조회 조건</h2>
                <div class="filter-group">
                    <div class="input-wrapper">
                        <label for="material-select">원부자재 선택</label>
                        <select id="material-select">
                            <option value="">원료를 선택하세요...</option>
                        </select>
                    </div>
                    <div class="input-wrapper">
                        <label for="lot-select">Lot 번호 선택</label>
                        <select id="lot-select" disabled>
                            <option value="">Lot 번호를 선택하세요...</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>데이터를 불러오는 중입니다...</p>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state">
                <i class="fa-solid fa-box-open"></i>
                <p>조회할 원료 및 Lot를 선택해주세요.</p>
            </div>

            <!-- Results Section -->
            <section id="results-section" class="results-section hidden">
                <!-- Summary Cards -->
                <div class="summary-cards">
                    <div class="card in-card glass-panel">
                        <div class="card-icon"><i class="fa-solid fa-arrow-down"></i></div>
                        <div class="card-info">
                            <h3>총 입고량</h3>
                            <p id="total-in" class="value">0</p>
                        </div>
                    </div>
                    <div class="card out-card glass-panel">
                        <div class="card-icon"><i class="fa-solid fa-arrow-up"></i></div>
                        <div class="card-info">
                            <h3>총 출고량</h3>
                            <p id="total-out" class="value">0</p>
                        </div>
                    </div>
                    <div class="card stock-card glass-panel highlight">
                        <div class="card-icon"><i class="fa-solid fa-boxes-packing"></i></div>
                        <div class="card-info">
                            <h3>현재고</h3>
                            <p id="current-stock" class="value">0</p>
                        </div>
                    </div>
                </div>

                <!-- Material Details Panel -->
                <div id="material-info-panel" class="material-info-panel glass-panel hidden">
                    <div class="info-item">
                        <i class="fa-regular fa-calendar-check"></i>
                        <div class="info-content">
                            <h4>입고일</h4>
                            <span id="info-receive-date">-</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-microscope"></i>
                        <div class="info-content">
                            <h4>Q.C.일자</h4>
                            <span id="info-qc-date">-</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-regular fa-calendar-xmark"></i>
                        <div class="info-content">
                            <h4>유효기간</h4>
                            <span id="info-expire-date">-</span>
                        </div>
                    </div>
                </div>

                <!-- History Table -->
                <div class="history-panel glass-panel">
                    <div class="panel-header">
                        <h2><i class="fa-solid fa-clock-rotate-left"></i> 상세 입출고 내역</h2>
                        <span id="product-label" class="badge"></span>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>일자</th>
                                    <th>구분</th>
                                    <th>수량</th>
                                    <th>사용 목적</th>
                                </tr>
                            </thead>
                            <tbody id="history-tbody">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
