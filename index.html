<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES 통합 관리 시스템 - 홈</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }

        /* ─── Top Header ─── */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            box-sizing: border-box;
            z-index: 100;
            gap: 1.5rem;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .header-brand i {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .header-brand span {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
            padding: 0.5rem 0.95rem;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .nav-btn i {
            font-size: 0.95rem;
            color: var(--primary);
        }

        .nav-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: white;
            transform: translateY(-1px);
        }

        .nav-btn:hover i {
            color: #93c5fd;
        }

        /* ─── Main Content ─── */
        .main-content {
            padding: 2rem 2.5rem;
            padding-top: calc(64px + 2rem);
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.4rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* ─── Stock Summary Grid ─── */
        .stock-panel {
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }

        .panel-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .panel-header h2 i {
            color: var(--primary);
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 0.4rem 0.9rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .refresh-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
        }

        /* ─── Modal ─── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
            opacity: 0; transition: opacity 0.2s;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            width: 90%; max-width: 800px; max-height: 85vh;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(20px); transition: transform 0.2s;
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header {
            padding: 1.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.4); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .modal-header h3 { margin: 0; font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 0.6rem; }
        .modal-header h3 i { color: var(--primary); }
        .modal-close {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 1.25rem; cursor: pointer; transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }
        .modal-body {
            padding: 1.5rem; overflow-y: auto; flex: 1;
        }
        .modal-table { width: 100%; border-collapse: collapse; }
        .modal-table th, .modal-table td {
            padding: 0.8rem 1rem; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            color: #fff;
        }
        .modal-table th { color: var(--text-muted); font-weight: 600; background: rgba(255, 255, 255, 0.02); position: sticky; top: 0; }
        .type-in { color: #10b981; font-weight: 600; }
        .type-out { color: #f43f5e; font-weight: 600; }
        
        .clickable-row { cursor: pointer; transition: background 0.15s; }
        .clickable-row:hover td { background: rgba(59, 130, 246, 0.1); }

        /* 카드 그리드: 6열 고정 */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.75rem;
            overflow: visible;
        }

        /* 그룹 헤더 */
        .group-header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 0 0.2rem;
            margin-top: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .group-header:first-child {
            margin-top: 0;
        }

        .group-badge {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: rgba(59, 130, 246, 0.18);
            color: #60a5fa;
            padding: 0.18rem 0.55rem;
            border-radius: 4px;
        }

        .group-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .stock-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            padding: 0.9rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .stock-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(59, 130, 246, 0.35);
            transform: translateY(-2px);
        }

        .card-code {
            font-family: monospace;
            font-size: 0.78rem;
            background: rgba(59, 130, 246, 0.12);
            color: #60a5fa;
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            align-self: flex-start;
        }

        .card-name {
            font-size: 0.88rem;
            color: var(--text-main);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-stock {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.2rem;
        }

        .card-unit {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 0.25rem;
        }

        .stock-pos {
            color: #10b981;
        }

        .stock-zero {
            color: var(--text-muted);
        }

        .stock-neg {
            color: #ef4444;
        }

        #stock-loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <header class="top-header">
        <a href="/" class="header-brand">
            <i class="fa-solid fa-layer-group"></i>
            <span>MES 통합 관리 시스템</span>
        </a>
        <nav class="header-nav">
            <a href="/material-info" class="nav-btn">
                <i class="fa-solid fa-list-ul"></i>
                안전재고
            </a>
            <a href="/inventory" class="nav-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
                원료상세검색
            </a>
            <a href="/raw-material" class="nav-btn">
                <i class="fa-solid fa-flask"></i>
                원재료관리
            </a>
            <a href="/producible" class="nav-btn">
                <i class="fa-solid fa-flask-vial"></i>
                생산가능수량
            </a>
            <a href="/production" class="nav-btn">
                <i class="fa-solid fa-industry"></i>
                생산 관리
            </a>
            <a href="/finished-product" class="nav-btn">
                <i class="fa-solid fa-box"></i>
                완제품관리
            </a>
            <a href="/validation" class="nav-btn">
                <i class="fa-solid fa-clipboard-check"></i>
                밸리데이션
            </a>
            <a href="/upload-usage" class="nav-btn">
                <i class="fa-solid fa-file-arrow-up"></i>
                사용량 업로드
            </a>
            <a href="/upload-receiving" class="nav-btn">
                <i class="fa-solid fa-file-import"></i>
                입고 업로드
            </a>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        <h1 class="page-title"><i class="fa-solid fa-chart-bar" style="color:var(--primary); margin-right: 0.5rem;"></i>
            원료 재고 현황</h1>
        <p class="page-subtitle">원료별 전체 재고 현황을 확인하세요. 상세 조회 및 생산 관리는 상단 메뉴를 이용하세요.</p>

        <!-- Stock Summary Panel -->
        <div class="stock-panel glass-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-chart-bar"></i> 원료별 재고 현황</h2>
                <a href="/raw-material" class="refresh-btn" style="text-decoration:none;">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> 상세보기
                </a>
            </div>
            <div class="stock-grid" id="stock-grid">
                <div id="stock-loading"><i class="fa-solid fa-circle-notch fa-spin"></i> 데이터를 불러오는 중입니다...</div>
            </div>
        </div>
        <!-- Finished Product Summary Panel -->
        <div class="stock-panel glass-panel" style="margin-top: 1.5rem;">
            <div class="panel-header">
                <h2><i class="fa-solid fa-box-open"></i> 완제품 Lot별 재고 현황</h2>
                <a href="/finished-product" class="refresh-btn" style="text-decoration:none;">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> 상세 보기
                </a>
            </div>
            <div id="fp-grid" style="overflow-x:auto; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:rgba(15,23,42,0.4);">
                <table style="width:100%; border-collapse:collapse; min-width:700px;">
                    <thead>
                        <tr>
                            <th style="padding:0.75rem 1rem; text-align:left; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">제품코드</th>
                            <th style="padding:0.75rem 1rem; text-align:left; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">제품명</th>
                            <th style="padding:0.75rem 1rem; text-align:left; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">Lot No.</th>
                            <th style="padding:0.75rem 1rem; text-align:left; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">제조일자</th>
                            <th style="padding:0.75rem 1rem; text-align:right; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">입고</th>
                            <th style="padding:0.75rem 1rem; text-align:right; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">출고</th>
                            <th style="padding:0.75rem 1rem; text-align:right; font-size:0.8rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.05);">현재 재고</th>
                        </tr>
                    </thead>
                    <tbody id="fp-tbody">
                        <tr><td colspan="7" style="text-align:center; padding:2rem; color:#94a3b8;"><i class="fa-solid fa-circle-notch fa-spin"></i> 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadStockSummary() {
            const grid = document.getElementById('stock-grid');
            const loading = document.getElementById('stock-loading');

            // 기존 카드 제거 (로딩 표시만 남김)
            [...grid.children].forEach(el => { if (el !== loading) el.remove(); });
            loading.style.display = 'block';
            loading.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 데이터를 불러오는 중입니다...';

            try {
                const res = await fetch('/api/stock/summary');
                const result = await res.json();

                loading.style.display = 'none';

                if (result.status === 'success') {
                    // 첫 글자 기준으로 그룹화
                    const GROUP_LABELS = { B: 'BCM — Breast Cancer Material', C: 'CMA — Chemical Material', E: 'EMA — Extra Material' };
                    const groups = {};
                    result.data.forEach(row => {
                        const key = (row.item_code ?? '').charAt(0).toUpperCase();
                        if (!groups[key]) groups[key] = [];
                        groups[key].push(row);
                    });

                    // 그룹 순서 정렬 후 렌더링
                    Object.keys(groups).sort().forEach(key => {
                        // 그룹 헤더
                        const header = document.createElement('div');
                        header.className = 'group-header';
                        header.innerHTML = `<span class="group-badge">${key}</span><span class="group-label">${GROUP_LABELS[key] ?? key + ' 그룹'}</span>`;
                        grid.appendChild(header);

                        // 카드
                        groups[key].forEach(row => {
                            const stock = row.total_stock ?? 0;
                            const stockClass = stock > 0 ? 'stock-pos' : (stock < 0 ? 'stock-neg' : 'stock-zero');
                            const card = document.createElement('div');
                            card.className = 'stock-card';
                            card.innerHTML = `
                                <span class="card-code">${row.item_code ?? '-'}</span>
                                <span class="card-name" title="${row.product_name ?? ''}">${row.product_name ?? '-'}</span>
                                <span class="card-stock ${stockClass}">${stock.toLocaleString()}<span class="card-unit">${row.unit ?? ''}</span></span>
                            `;
                            grid.appendChild(card);
                        });
                    });
                }
            } catch (e) {
                loading.style.display = 'block';
                loading.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> 데이터를 불러올 수 없습니다.';
            }
        }

        loadStockSummary();

        async function loadFinishedProductSummary() {
            const tbody = document.getElementById('fp-tbody');
            try {
                const res = await fetch('/api/finished-product/inventory');
                const result = await res.json();
                tbody.innerHTML = '';
                
                if (result.status === 'success' && result.data.length > 0) {
                    // 재고가 1개 이상인 항목만 필터링
                    const activeItems = result.data.filter(item => item.current_stock > 0);
                    
                    if (activeItems.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem; color:#94a3b8;">현재 재고가 있는 Lot이 없습니다.</td></tr>';
                        return;
                    }

                    activeItems.forEach(item => {
                        const stockClass = '#10b981'; // 필터링했으므로 무조건 양수색상
                        const tr = document.createElement('tr');
                        tr.className = 'clickable-row';
                        tr.onclick = () => openLotModal(item.lot_no);
                        tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                        tr.innerHTML = `
                            <td style="padding:0.75rem 1rem; font-family:monospace; color:#60a5fa; font-weight:600;">${item.product_code || '-'}</td>
                            <td style="padding:0.75rem 1rem; font-weight:500;">${item.product_name || '-'}</td>
                            <td style="padding:0.75rem 1rem;"><span style="font-family:monospace; background:rgba(255,255,255,0.08); padding:0.15rem 0.45rem; border-radius:4px; font-size:0.83rem;">${item.lot_no || '-'}</span></td>
                            <td style="padding:0.75rem 1rem; color:#cbd5e1; font-size:0.88rem;">${item.manufacture_date || '-'}</td>
                            <td style="padding:0.75rem 1rem; text-align:right; font-weight:600;">${(item.total_in || 0).toLocaleString()} <span style="font-size:0.75rem;color:#94a3b8;">Kit</span></td>
                            <td style="padding:0.75rem 1rem; text-align:right; font-weight:600; color:#f43f5e;">${(item.total_out || 0).toLocaleString()} <span style="font-size:0.75rem;color:#94a3b8;">Kit</span></td>
                            <td style="padding:0.75rem 1rem; text-align:right; font-weight:700; color:${stockClass};">${(item.current_stock || 0).toLocaleString()} <span style="font-size:0.75rem;color:#94a3b8;">Kit</span></td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem; color:#94a3b8;">데이터가 없습니다.</td></tr>';
                }
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem; color:#ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> 데이터를 불러올 수 없습니다.</td></tr>';
            }
        }
        loadFinishedProductSummary();

        // 모달 로직
        function getModal() { return document.getElementById('lot-modal'); }
        
        function closeLotModal() {
            const modal = getModal();
            if(!modal) return;
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = 'none'; }, 200);
        }

        async function openLotModal(lotNo) {
            const modal = getModal();
            if(!modal) return;
            document.getElementById('modal-lot-title').innerText = `[${lotNo}] 입출고 상세 내역`;
            const tbody = document.getElementById('modal-tbody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #94a3b8;"><i class="fa-solid fa-circle-notch fa-spin"></i> 로딩 중...</td></tr>';
            
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('show'));

            try {
                const res = await fetch('/api/finished-product/lot/' + encodeURIComponent(lotNo));
                const result = await res.json();

                if (result.status === 'success') {
                    tbody.innerHTML = '';
                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #94a3b8;">상세 내역이 없습니다.</td></tr>';
                        return;
                    }

                    result.data.forEach(item => {
                        const tr = document.createElement('tr');
                        const isOut = item.transaction_type.includes('출고');
                        const typeClass = isOut ? 'type-out' : 'type-in';
                        
                        tr.innerHTML = `
                            <td class="${typeClass}">${item.transaction_type}</td>
                            <td style="color:#cbd5e1;">${item.transaction_date || '-'}</td>
                            <td style="text-align:right; font-weight:600;">${(item.quantity_kit || 0).toLocaleString()} <span style="font-size:0.75rem;color:#94a3b8;font-weight:400;">Kit</span></td>
                            <td>${item.destination || '-'}</td>
                            <td>${item.qc_info || '-'}</td>
                            <td style="color:#94a3b8;">${item.remark || '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #ef4444;">에러 발생: ${err.message}</td></tr>`;
            }
        }
    </script>

    <!-- Modal HTML -->
    <div id="lot-modal" class="modal-overlay" onclick="if(event.target===this) closeLotModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> <span id="modal-lot-title">Lot 상세 내역</span></h3>
